# Sass
sass:
  sass_dir: _sass
  style: compressed

# Site author
author:
  name: Marx Wang
  role: PhD Candidate
  affiliation: University of Washington
  department: Information School
  focus: AI Alignment & Human-Computer Interaction
  email: marxwang@uw.edu
  phone: "(540) 998-5525"
  website: marxvwang.com
  image: ""
  initials: MW
  bio: >-
    My research sits at the intersection of HCI and LLM Alignment, examining
    relational and affective dynamics in human-AI interaction through mixed methods:
    qualitative conversation analysis grounded in developmental psychology,
    computational psycholinguistics/NLP, and mechanistic interpretability using
    Sparse Autoencoders to identify and steer affect-aligned features in LLM activations.

